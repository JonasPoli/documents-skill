<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Pré-Cadastro - Colégio Conexão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .form-container { background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 40px; margin-top: 50px; }
        .btn-primary { background-color: #004a99; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; }
        .header-conexao { border-bottom: 3px solid #004a99; margin-bottom: 30px; padding-bottom: 10px; }
        .section-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #6c757d; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-container">
                    <div class="header-conexao text-center">
                        <h2 class="fw-bold text-dark">PRÉ-CADASTRO 2027</h2>
                        <p class="text-muted">Ensino Fundamental – Anos Iniciais</p>
                    </div>

                    <form>
                        <div class="section-title">Dados do Aluno e Responsável</div>
                        <div class="mb-3">
                            <label class="form-label">Nome Completo do Aluno</label>
                            <input type="text" class="form-control" placeholder="Digite o nome do aluno">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nome do Responsável</label>
                                <input type="text" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Celular</label>
                                <input type="text" class="form-control" placeholder="(00) 0 0000-0000">
                            </div>
                        </div>

                        <div class="section-title mt-4">Preferências</div>
                        <div class="mb-3">
                            <label class="form-label d-block">Série Pretendida</label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="serie" id="s1" checked>
                                <label class="btn btn-outline-primary" for="s1">1º Ano</label>
                                <input type="radio" class="btn-check" name="serie" id="s2">
                                <label class="btn btn-outline-primary" for="s2">2º Ano</label>
                                <input type="radio" class="btn-check" name="serie" id="s3">
                                <label class="btn btn-outline-primary" for="s3">3º Ano</label>
                                <input type="radio" class="btn-check" name="serie" id="s4">
                                <label class="btn btn-outline-primary" for="s4">4º Ano</label>
                                <input type="radio" class="btn-check" name="serie" id="s5">
                                <label class="btn btn-outline-primary" for="s5">5º Ano</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Turno</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="turno" id="t1" checked>
                                <label class="form-check-label" for="t1">Manhã</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="turno" id="t2">
                                <label class="form-check-label" for="t2">Tarde</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="turno" id="t3">
                                <label class="form-check-label" for="t3">Integral</label>
                            </div>
                        </div>

                        <div class="text-center mt-5">
                            <button type="button" class="btn btn-primary btn-lg">Confirmar interesse →</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
