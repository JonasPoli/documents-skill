<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Pré-cadastro Ensino Fundamental 2027</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; }
        .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: auto; border-top: 5px solid #1f4e79; }
        .header-logo { color: #1f4e79; font-weight: bold; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .section-title { font-size: 16px; font-weight: bold; color: #2e74b5; margin-top: 25px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; text-transform: uppercase; }
        .btn-primary { background-color: #1f4e79; border: none; padding: 12px; font-weight: bold; transition: all 0.3s; }
        .btn-primary:hover { background-color: #2e74b5; transform: translateY(-2px); }
        .form-label { font-size: 14px; color: #555; font-weight: 500; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="header-logo">Colégio Conexão</div>
        <h2 class="text-center h5 mb-4">PRÉ-CADASTRO: ENSINO FUNDAMENTAL 2027</h2>
        
        <form>
            <div class="section-title">Dados do Aluno e Responsável</div>
            <div class="mb-3">
                <label class="form-label">Nome completo do aluno</label>
                <input type="text" class="form-control form-control-sm" placeholder="Ex: João Silva">
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">E-mail do responsável</label>
                    <input type="email" class="form-control form-control-sm" placeholder="seu@email.com">
                </div>
                <div class="col">
                    <label class="form-label">WhatsApp</label>
                    <input type="text" class="form-control form-control-sm" placeholder="(16) 99999-9999">
                </div>
            </div>
            
            <div class="section-title">Série e Turno Pretendido</div>
            <div class="mb-3">
                <label class="form-label">Série para 2027</label>
                <select class="form-select form-select-sm">
                    <option selected disabled>Selecione a série...</option>
                    <option>1º ano</option>
                    <option>2º ano</option>
                    <option>3º ano</option>
                    <option>4º ano</option>
                    <option>5º ano</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="form-label d-block text-center mb-2">Preferência de Turno</label>
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="turno" id="manha" autocomplete="off">
                    <label class="btn btn-outline-secondary btn-sm" for="manha">Manhã</label>
                    <input type="radio" class="btn-check" name="turno" id="tarde" autocomplete="off">
                    <label class="btn btn-outline-secondary btn-sm" for="tarde">Tarde</label>
                    <input type="radio" class="btn-check" name="turno" id="integral" autocomplete="off">
                    <label class="btn btn-outline-secondary btn-sm" for="integral">Integral</label>
                </div>
            </div>
            
            <button type="button" class="btn btn-primary w-100">CONFIRMAR INTERESSE NO PRÉ-CADASTRO</button>
        </form>
    </div>
</body>
</html>
