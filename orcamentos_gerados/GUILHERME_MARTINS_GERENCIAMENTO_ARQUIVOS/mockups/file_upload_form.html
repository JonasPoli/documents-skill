<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Upload de Arquivo - WAB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .container { max-width: 800px; padding: 50px 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-area { border: 2px dashed #dee2e6; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: #0d6efd; background-color: #f0f7ff; }
        .form-label { font-weight: 600; color: #495057; }
        .header-title { border-left: 5px solid #0d6efd; padding-left: 15px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-title">
            <h2 class="fw-bold">Novo Envio de Arquivo</h2>
            <p class="text-muted">Preencha os dados abaixo para disponibilizar um novo documento.</p>
        </div>

        <div class="card p-4 p-md-5">
            <form>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Tipo do Arquivo</label>
                        <select class="form-select">
                            <option selected>Selecione o tipo...</option>
                            <option>Contrato</option>
                            <option>Nota Fiscal</option>
                            <option>Relatório</option>
                            <option>Documento Pessoal</option>
                            <option>Outros</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Data e Horário</label>
                        <input type="datetime-local" class="form-control" value="2026-03-24T10:30">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Título do Arquivo</label>
                        <input type="text" class="form-control" placeholder="Ex: Contrato Social de Prestação de Serviços">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Identificação</label>
                        <input type="text" class="form-control" placeholder="Campo livre de entrada">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Finalidade</label>
                        <input type="text" class="form-control" placeholder="Campo livre de entrada">
                    </div>

                    <div class="col-12 my-4">
                        <div class="upload-area">
                            <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
                            <h5>Clique ou arraste o arquivo para aqui</h5>
                            <p class="text-muted small">Formatos aceitos: PDF, DOCX, ZIP, JPG (Máx 50MB)</p>
                            <input type="file" class="d-none" id="fileInput">
                        </div>
                    </div>

                    <hr class="my-4">
                    <h5 class="fw-bold mb-3"><i class="fas fa-user-tag me-2"></i> Dados do Destinatário</h5>

                    <div class="col-md-6">
                        <label class="form-label">Nome do Destinatário</label>
                        <input type="text" class="form-control" placeholder="Nome completo">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">E-mail do Destinatário</label>
                        <input type="email" class="form-control" placeholder="email@exemplo.com">
                    </div>

                    <div class="col-12 mt-5">
                        <div class="alert alert-info border-0 shadow-sm d-flex align-items-center">
                            <i class="fas fa-info-circle fa-lg me-3"></i>
                            <span>Ao finalizar, o destinatário receberá um e-mail com o link seguro para download.</span>
                        </div>
                    </div>

                    <div class="col-12 text-end mt-4">
                        <button type="button" class="btn btn-light btn-lg px-4 me-2">Cancelar</button>
                        <button type="submit" class="btn btn-primary btn-lg px-4 shadow">Finalizar e Enviar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
