<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css'>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #333; margin: 0; padding: 0; }
        .sidebar { width: 280px; background: #1a1e2b; color: #fff; height: 100vh; position: fixed; padding: 25px; box-sizing: border-box; }
        .sidebar .nav-link { color: #aeb7c2; font-weight: 500; padding: 12px 0; display: block; text-decoration: none; transition: 0.3s; }
        .sidebar .nav-link.active { color: #FF8364; }
        .sidebar .nav-link i { margin-right: 12px; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; box-sizing: border-box; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: #fff; margin-bottom: 20px; }
        .btn-coral { background: #FF8364; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 700; text-decoration: none; display: inline-block; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        .table thead { background: #f8f9fa; }
        h1 { font-weight: 800; color: #1a1e2b; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class='sidebar'>
        <h4 class='mb-4 text-center' style='color: #FF8364; font-weight: 800;'>UIA SYSTEM</h4>
        <nav class='mt-5'>
            <a href='dashboard.html' class='nav-link '><i class='bi bi-speedometer2'></i> Dashboard</a>
            <a href='clientes_lista.html' class='nav-link '><i class='bi bi-person-lines-fill'></i> Clientes</a>
            <a href='projetos_lista.html' class='nav-link '><i class='bi bi-folder2-open'></i> Projetos</a>
            <a href='historico_lista.html' class='nav-link active'><i class='bi bi-clock-history'></i> Histórico</a>
        </nav>
    </div>
    <div class='main-content'>

            <h1>Novo Registro de História</h1>
            <div class='card p-5' style='max-width: 800px;'>
                <form>
                    <div style='margin-bottom: 20px;'><label style='font-weight: 600;'>Descrição da Atividade</label><textarea class='form-control' rows='4'></textarea></div>
                    <div style='margin-bottom: 20px;'><label style='font-weight: 600;'>Anexar Mídia (Áudio/Imagem/PDF)</label><input type='file' class='form-control'></div>
                    <button class='btn-coral'>Registrar na Timeline</button>
                </form>
            </div>
        
    </div>
</body>
</html>
