<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>

    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css'>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #333; margin: 0; padding: 0; }
        .sidebar { width: 280px; background: #1a1e2b; color: #fff; height: 100vh; position: fixed; padding: 25px; box-sizing: border-box; }
        .sidebar .nav-link { color: #aeb7c2; font-weight: 500; padding: 12px 0; display: block; text-decoration: none; transition: 0.3s; }
        .sidebar .nav-link.active { color: #FF8364; }
        .sidebar .nav-link i { margin-right: 12px; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; box-sizing: border-box; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: #fff; margin-bottom: 20px; }
        .btn-coral { background: #FF8364; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; text-decoration: none; display: inline-block; font-size: 0.9rem; }
        .btn-action { background: #e9ecef; color: #333; border: none; padding: 5px 10px; border-radius: 6px; font-size: 0.85rem; margin-right: 5px; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-action:hover { background: #FF8364; color: white; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        .table thead { background: #f8f9fa; border-top: 1px solid #dee2e6; }
        .table th { font-weight: 600; color: #666; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 15px 10px; }
        .table td { vertical-align: middle; padding: 15px 10px; font-size: 0.95rem; }
        h1 { font-weight: 800; color: #1a1e2b; margin-bottom: 10px; }
        .badge { padding: 6px 12px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; }
        .badge-active { background-color: #d1e7dd; color: #0f5132; }
        .badge-pending { background-color: #fff3cd; color: #664d03; }
    </style>
</head>

</html>
