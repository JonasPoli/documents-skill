<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #1f4e79; padding: 50px; color: white; }
        .reg-container { max-width: 600px; margin: auto; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; }
        .section-title { text-align: center; margin-bottom: 20px; font-weight: bold; }
        .section-subtitle { text-align: center; margin-bottom: 40px; color: #aaa; }
        .form-label { font-weight: 600; font-size: 0.9rem; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 10px; padding: 12px; }
        .form-control::placeholder { color: #888; }
        .btn-submit { background-color: #b22222; border: none; padding: 15px; font-weight: bold; text-transform: uppercase; width: 100%; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="reg-container">
        <h2 class="section-title">Register for the Event</h2>
        <p class="section-subtitle">And stay up-to-date with the latest scientific news.</p>
        <form>
            <div class="mb-3">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" placeholder="Enter your name">
            </div>
            <div class="mb-3">
                <label class="form-label">Phone *</label>
                <input type="text" class="form-control" placeholder="(00) 00000-0000">
            </div>
            <div class="mb-3">
                <label class="form-label">E-mail *</label>
                <input type="email" class="form-control" placeholder="your@email.com">
            </div>
            <button type="button" class="btn btn-primary btn-submit">Submit Registration</button>
        </form>
    </div>
</body>
</html>
