<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASTMJS Meeting 2026 Mockup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #000; color: #fff; margin: 0; }
        .hero { 
            position: relative;
            height: 600px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1516594915697-87eb3b1c14ea?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80'); /* Wine theme background */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 4px solid #b22222; /* Wine-like red */
        }
        .hero-content { max-width: 800px; padding: 20px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin-bottom: 10px; color: #fff; }
        .hero h2 { font-weight: 300; font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        .hero .info { font-size: 1.2rem; margin-bottom: 40px; color: #ddd; }
        
        .timer { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .timer-unit { text-align: center; }
        .timer-val { font-size: 3rem; font-weight: 600; display: block; line-height: 1; }
        .timer-label { font-size: 0.8rem; text-transform: uppercase; color: #aaa; }
        
        .btn-register { 
            background-color: #b22222; 
            color: white; 
            padding: 15px 40px; 
            font-weight: 600; 
            text-transform: uppercase; 
            border: none; 
            border-radius: 0;
            transition: 0.3s;
        }
        .btn-register:hover { background-color: #8b0000; transform: scale(1.05); }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1>LASTMJSMeeting 2026</h1>
            <h2>Advanced TMJ Surgery & Clinical Treatment</h2>
            <p class="info">May 28-30, 2026 | Hotel Spa do Vinho, Vale dos Vinhedos, RS</p>
            
            <div class="timer">
                <div class="timer-unit">
                    <span class="timer-val">065</span>
                    <span class="timer-label">Day(s)</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-val">01</span>
                    <span class="timer-label">Hour(s)</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-val">15</span>
                    <span class="timer-label">Minute(s)</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-val">47</span>
                    <span class="timer-label">Second(s)</span>
                </div>
            </div>
            
            <button class="btn btn-register">Register Now</button>
        </div>
    </section>
</body>
</html>
